name: Refresh Content Ideas

on:
  schedule:
    - cron: '0 10 * * 1'   # Monday 10am UTC
    - cron: '0 10 * * 4'   # Thursday 10am UTC
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate fresh ideas
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: python scripts/generate_ideas.py

      - name: Commit to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/scripts-data.json
          git diff --staged --quiet || git commit -m "Refresh content ideas $(date -u '+%Y-%m-%d')"
          git push origin main

      - name: Sync to gh-pages
        run: |
          cp dashboard/scripts-data.json /tmp/scripts-data.json
          git fetch origin gh-pages
          git checkout gh-pages
          cp /tmp/scripts-data.json scripts-data.json
          git add scripts-data.json
          git diff --staged --quiet || git commit -m "Sync ideas to gh-pages $(date -u '+%Y-%m-%d')"
          git push --force origin gh-pages
