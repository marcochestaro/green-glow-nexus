name: Update Dashboard Data

on:
  schedule:
    - cron: '0 10 * * *'   # runs every day at 10:00 AM UTC (8 PM AEST)
  workflow_dispatch:         # allows manual trigger from GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: claude/practical-faraday-cindzs

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Instagram data via Apify
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: node scripts/fetch-instagram.js

      - name: Commit updated data.json to main branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/data.json
          git diff --staged --quiet || git commit -m "Auto-update: Instagram data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin claude/practical-faraday-cindzs

      - name: Sync updated files to gh-pages
        run: |
          git fetch origin gh-pages
          git checkout gh-pages
          git checkout claude/practical-faraday-cindzs -- dashboard/index.html
          cp dashboard/data.json data.json
          git add index.html data.json
          git diff --staged --quiet || git commit -m "Auto-sync dashboard to gh-pages $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin gh-pages
